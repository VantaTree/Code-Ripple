<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-900 h-screen overflow-hidden">

<!-- ================= HEADER ================= -->
<header class="border-b bg-white px-6 py-4 flex justify-between items-center">
    <div>
        <h1 class="text-xl font-bold">Impact Analysis</h1>
        <p class="text-sm text-gray-500">{{ repo_url }}</p>
    </div>

    <div class="text-sm text-right">
        <div class="font-mono">{{ commit1[:7] }} → {{ commit2[:7] }}</div>
        <div class="text-gray-500">Cache: {{ cache_status }}</div>
    </div>
</header>

<!-- ================= MAIN ================= -->
<div class="grid grid-cols-[300px_1fr] h-[calc(100vh-73px)]">

    <!-- ================= LEFT: CHUNKS ================= -->
    <aside class="border-r bg-white overflow-y-auto">

        <div class="p-4 border-b">
            <h2 class="font-semibold text-sm text-gray-600">Changes</h2>
        </div>
    {% else %}
        <!-- This header uses server-rendered metadata so the user does not need to enter commits again. -->
        <div class="grid gap-4 md:grid-cols-3 mb-8">
            <div class="rounded-lg border border-gray-200 bg-gray-50 p-4">
                <p class="text-xs text-gray-500 mb-2">Repository</p>
                <p class="break-all font-medium">{{ repo_url }}</p>
            </div>
            <div class="rounded-lg border border-gray-200 bg-gray-50 p-4">
                <p class="text-xs text-gray-500 mb-2">Commit 1</p>
                <p class="font-mono text-sm break-all text-gray-700">{{ commit1 }}</p>
            </div>
            <div class="rounded-lg border border-gray-200 bg-gray-50 p-4">
                <p class="text-xs text-gray-500 mb-2">Commit 2</p>
                <p class="font-mono text-sm break-all text-gray-700">{{ commit2 }}</p>
            </div>
        </div>

        {% if cached_at %}
            <p class="text-sm text-gray-500 mb-6">Cached result updated at {{ cached_at }}</p>
        {% endif %}

        </section>

        <!-- ===== IMPACT + CONTEXT ===== -->
        <section class="border-t bg-white p-4 h-[280px] overflow-auto">

            <div class="grid grid-cols-2 gap-6">

                <!-- IMPACT -->
                <div>
                    <h3 class="text-sm font-semibold mb-2">Impact</h3>
                    <div id="impactContainer" class="space-y-2 text-sm"></div>
                </div>

                <!-- CONTEXT -->
                <div>
                    <h3 class="text-sm font-semibold mb-2">Code Context</h3>
                    <div id="contextContainer" class="space-y-2 text-xs font-mono"></div>
                </div>

            </div>

        </section>

    </main>

</div>

<!-- ================= DATA ================= -->
<script>
window.__ANALYSIS_DATA__ = {{ {
    "chunks": chunks,
    "summary": summary,
    "meta": meta
} | tojson }};
</script>

<script src="/static/analysis.js"></script>

</body>
</html>
