<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-900 h-screen overflow-hidden">

<!-- ================= HEADER ================= -->
<header class="border-b bg-white px-6 py-4 flex justify-between items-center">
    <div>
        <h1 class="text-xl font-bold">Impact Analysis</h1>
        <p class="text-sm text-gray-500">{{ repo_url }}</p>
    </div>

    <div class="text-sm text-right">
        <div class="font-mono">{{ commit1[:7] }} → {{ commit2[:7] }}</div>
        <div class="text-gray-500">Cache: {{ cache_status }}</div>
    </div>
</header>

<!-- ================= MAIN ================= -->
<div class="grid grid-cols-[300px_1fr] h-[calc(100vh-73px)]">

    <!-- ================= LEFT: CHUNKS ================= -->
    <aside class="border-r bg-white overflow-y-auto">

        <div class="p-4 border-b">
            <h2 class="font-semibold text-sm text-gray-600">Changes</h2>
        </div>

        {% if chunks %}
            <div class="divide-y">
                {% for chunk in chunks %}
                <button
                    class="chunk-btn w-full text-left p-4 hover:bg-gray-50"
                    data-index="{{ loop.index0 }}"
                >
                    <div class="text-xs text-gray-500">{{ chunk.file }}</div>
                    <div class="font-mono text-sm mt-1">
                        {{ chunk.header }}
                    </div>

                    <div class="mt-2 flex gap-2 text-xs">
                        <span class="text-red-600 font-medium">
                            {{ chunk.severity }}
                        </span>
                        <span class="text-gray-400">
                            {{ chunk.direct_changes.functions|length }} fn
                        </span>
                        <span class="text-gray-400">
                            {{ chunk.direct_changes.globals|length }} global
                        </span>
                    </div>
                </button>
                {% endfor %}
            </div>
        {% else %}
            <div class="p-4 text-gray-500 text-sm">
                No changes detected.
            </div>
        {% endif %}
    </aside>

    <!-- ================= RIGHT: VIEWER ================= -->
    <main class="overflow-hidden flex flex-col">

        <!-- ===== DIFF ===== -->
        <section class="flex-1 overflow-auto p-6">

            <div id="diffContainer"></div>

        </section>

        <!-- ===== IMPACT + CONTEXT ===== -->
        <section class="border-t bg-white p-4 h-[280px] overflow-auto">

            <div class="grid grid-cols-2 gap-6">

                <!-- IMPACT -->
                <div>
                    <h3 class="text-sm font-semibold mb-2">Impact</h3>
                    <div id="impactContainer" class="space-y-2 text-sm"></div>
                </div>

                <!-- CONTEXT -->
                <div>
                    <h3 class="text-sm font-semibold mb-2">Code Context</h3>
                    <div id="contextContainer" class="space-y-2 text-xs font-mono"></div>
                </div>

            </div>

        </section>

    </main>

</div>

<!-- ================= DATA ================= -->
<script>
window.__ANALYSIS_DATA__ = {{ {
    "chunks": chunks,
    "summary": summary,
    "meta": meta
} | tojson }};
</script>

<script src="/static/analysis.js"></script>

</body>
</html>
