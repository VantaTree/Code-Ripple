<!DOCTYPE html>
<html>
<head>
    <title>Analyzing...</title>
    <link rel="icon" type="image/x-icon" href="/static/CodeRippleLogo.svg">
    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #334155;
            border-top: 6px solid #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .message {
            font-size: 18px;
            text-align: center;
            max-width: 500px;
        }
    </style>
</head>
<body>

<div class="spinner"></div>
<div class="message" id="message">Initializing analysis...</div>

<script>
const messages = [
    "Parsing AST trees...",
    "Building dependency graph...",
    "Tracing function impacts...",
    "Running ML classification...",
    "Estimating impact severity...",
    "Optimizing graph traversal...",
    "Analyzing commit diffs...",
    "Detecting hidden dependencies...",
    "Scoring risk propagation...",
    "Finalizing results..."
];

let i = 0;
setInterval(() => {
    document.getElementById("message").innerText = messages[i % messages.length];
    i++;
}, 2000);

// Poll backend
const cacheKey = "{{ cache_key }}";

async function checkReady() {
    try {
        const res = await fetch(`/api/analysis/${cacheKey}`);
        if (res.status === 200) {
            const data = await res.json();
            if (data.status === "ready") {
                window.location.replace(`/analysis/${cacheKey}`);
            }
        }
    } catch (e) {}

    setTimeout(checkReady, 2000);
}

checkReady();
</script>

</body>
</html>
