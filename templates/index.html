<!DOCTYPE html>
<html>
<head>
  <title>Impact Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-lg rounded-xl p-6 w-full max-w-2xl">

    <h1 class="text-2xl font-bold mb-4 text-center">
      GitHub Change Impact Analyzer
    </h1>

    <!-- Submit the repo URL directly to /commits so Flask can render the results page with Jinja. -->
    <form action="/commits" method="get" class="flex gap-2 mb-4">
      <input 
        id="repoInput"
        name="repo_url"
        type="text"
        placeholder="https://github.com/user/repo"
        class="flex-1 border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        required
      >
      <button
        type="submit"
        class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600"
      >
        Fetch
      </button>
    </form>

    <p class="text-sm text-gray-500 text-center">
      Fetch a repository to open a dedicated results page with its latest commits.
    </p>

  </div>

  <script src="/static/main.js"></script>

</body>
</html>
