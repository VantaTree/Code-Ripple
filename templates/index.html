<!DOCTYPE html>
<html>
<head>
  <title>Impact Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-lg rounded-xl p-6 w-full max-w-2xl">

    <h1 class="text-2xl font-bold mb-4 text-center">
      GitHub Change Impact Analyzer
    </h1>

    <!-- Repo Input -->
    <div class="flex gap-2 mb-4">
      <input 
        id="repoInput"
        type="text"
        placeholder="https://github.com/user/repo"
        class="flex-1 border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
      <button 
        onclick="fetchCommits()"
        class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600"
      >
        Fetch
      </button>
    </div>

    <!-- Commits -->
    <div>
      <h2 class="text-lg font-semibold mb-2">Commits</h2>
      <div id="commitList" class="max-h-64 overflow-y-auto border rounded-lg p-2 bg-gray-50"></div>
    </div>

    <!-- Actions -->
    <div class="flex gap-2 mt-4">
      <button 
        onclick="compareLatest()"
        class="flex-1 bg-green-500 text-white py-2 rounded-lg hover:bg-green-600"
      >
        Compare Latest 2
      </button>

      <button 
        onclick="compareSelected()"
        class="flex-1 bg-purple-500 text-white py-2 rounded-lg hover:bg-purple-600"
      >
        Compare Selected
      </button>
    </div>

  </div>

  <script src="/static/main.js"></script>

</body>
</html>
